version: '3.8'

services:
  mysql_db:
    image: mysql:8.0
    container_name: emotion_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  node_backend:
    build:
      context: ./backend
    container_name: emotion_node
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=mysql_db
      - DB_USER=root
      - DB_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - DB_NAME=${MYSQL_DATABASE}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - mysql_db

  flask_ml:
    build:
      context: ./ml-service
    container_name: emotion_flask
    ports:
      - "8000:8000"
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGIN=http://localhost

  nginx:
    image: nginx:alpine
    container_name: emotion_nginx
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./frontend/dist:/usr/share/nginx/html
    depends_on:
      - node_backend
      - flask_ml

volumes:
  db_data:
